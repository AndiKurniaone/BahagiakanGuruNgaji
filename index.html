<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bahagiakan Guru Ngaji</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#f5e6d3,#e8d5b5);
  overflow:hidden;
  position:relative;
  color:#5a4633;
}

/* Background Arabic Pattern */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background-image:url('https://www.transparenttextures.com/patterns/arabesque.png');
  opacity:0.08;
  animation:moveBg 40s linear infinite;
}

@keyframes moveBg{
  from{transform:translate(0,0);}
  to{transform:translate(-200px,-200px);}
}

.container{
  position:relative;
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(15px);
  padding:45px 30px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
  animation:fadeIn 1.5s ease;
}

/* Animasi masuk */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* Ornamen Masjid */
.mosque{
  font-size:40px;
  margin-bottom:10px;
  opacity:0.7;
}

h1{
  font-size:22px;
  font-weight:700;
}

h2{
  font-size:14px;
  margin-bottom:20px;
  opacity:0.8;
}

/* Glow QR */
.qr-box{
  margin:20px 0;
}

.qr-box img{
  width:230px;
  border-radius:15px;
  box-shadow:0 0 25px rgba(212,180,131,0.8);
  transition:0.4s;
}

.qr-box img:hover{
  transform:scale(1.05);
  box-shadow:0 0 40px rgba(212,180,131,1);
}

.countdown{
  margin-top:15px;
  font-size:14px;
  font-weight:500;
}

.footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container">
  <div class="mosque">🕌</div>
  <h1>Bahagiakan Guru Ngaji</h1>
  <h2>Masjid Al Muhajirin</h2>

  <div class="qr-box">
    <img src="qris.png" alt="QR Donasi">
  </div>

  <p>Scan QR untuk berdonasi</p>

  <div class="countdown" id="countdown"></div>

  <div class="footer">
    “Sebaik-baik kalian adalah yang belajar Al-Qur’an dan mengajarkannya.”
  </div>
</div>

<script>
// ===== Countdown Ramadhan (Perkiraan Otomatis) =====
// Ganti tanggal jika sudah ada keputusan resmi
const ramadhan = new Date("March 1, 2026 00:00:00").getTime();

const timer = setInterval(function(){
  const now = new Date().getTime();
  const distance = ramadhan - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

  if(distance > 0){
    document.getElementById("countdown").innerHTML =
      "🌙 Menuju Ramadhan: " + days + " hari " + hours + " jam " + minutes + " menit";
  } else {
    document.getElementById("countdown").innerHTML =
      "🌙 Ramadhan Telah Tiba";
    clearInterval(timer);
  }
},1000);
</script>

</body>
</html>
